name: Keep Streamlit Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            --max-time 30 \
            https://aryanskothari-deal-sourcing.streamlit.app
          echo " — app pinged"
